<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 42rem;">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="display-5 fw-bold">Thank you, {{ name }}!</h1>
            <p class="lead">Your message has been received by the Flask server.</p>

            {% if subject %}
                <p><strong>Subject:</strong> {{ subject }}</p>
            {% endif %}

            <a href="/" class="btn btn-primary">Return to home page</a>
        </div>
    </div>
</main>
</body>
</html>
