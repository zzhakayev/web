<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 46rem;">
        <div class="card-body p-4 p-md-5">
            <p class="text-uppercase fw-bold text-primary mb-2">SQLite</p>
            <h1 class="display-5 fw-bold mb-4">Add New Project</h1>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/projects/new">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-control"
                        value="{{ values.get('title', '') if values else '' }}"
                        required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        class="form-control"
                        rows="4"
                        required>{{ values.get('description', '') if values else '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="language" class="form-label fw-bold">Technology</label>
                    <input
                        type="text"
                        id="language"
                        name="language"
                        class="form-control"
                        value="{{ values.get('language', '') if values else '' }}"
                        required>
                </div>

                <div class="mb-4">
                    <label for="url" class="form-label fw-bold">Project URL</label>
                    <input
                        type="url"
                        id="url"
                        name="url"
                        class="form-control"
                        value="{{ values.get('url', '') if values else '' }}"
                        required>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-primary">Save Project</button>
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
