<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
            <p class="text-uppercase fw-bold text-primary mb-2">Project {{ project.id }}</p>
            <h1 class="display-5 fw-bold">{{ project.name }}</h1>
            <p class="lead text-muted">{{ project.description }}</p>
            <p><strong>Technology:</strong> {{ project.language }}</p>

            <div class="d-flex gap-2 flex-wrap">
                <a href="{{ project.html_url }}" target="_blank" rel="noopener" class="btn btn-dark">Open GitHub</a>
                <a href="/" class="btn btn-outline-secondary">Back to portfolio</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
